<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<style>
body{background:#0d1f2d;color:#fff;font-family:sans-serif;padding:10px;}
button{display:block;width:100%;text-align:left;padding:12px;margin:6px 0;
  border-radius:8px;border:1px solid rgba(75,174,216,0.3);
  background:rgba(255,255,255,0.06);color:#fff;font-size:14px;cursor:pointer;}
button.selected{background:rgba(75,174,216,0.35);border-color:#4BAED8;}
#detail{background:rgba(75,174,216,0.1);border:1px solid rgba(75,174,216,0.3);
  border-radius:8px;padding:12px;margin-bottom:12px;display:none;}
</style>
</head>
<body>
<h2>洪水履歴テスト</h2>
<div id="detail">選択中: <span id="detail-text"></span></div>
<div id="list"></div>
<script>
const events = [
  {id:'e1', label:'H28 09.18', qin:1404.7},
  {id:'e2', label:'H29 08.18', qin:735.7},
  {id:'e3', label:'H30 09.30', qin:1532.6},
];
let selected = null;

function select(id) {
  selected = id;
  document.getElementById('detail').style.display = 'block';
  document.getElementById('detail-text').textContent = id;
  renderList();
}

function renderList() {
  document.getElementById('list').innerHTML = events.map(e =>
    `<button class="${selected===e.id?'selected':''}" onclick="select('${e.id}')">
      ${e.label} / ${e.qin} m³/s
    </button>`
  ).join('');
}

renderList();
</script>
</body>
</html>
