<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Hiragino Kaku Gothic ProN","Noto Sans CJK JP",sans-serif; background: #1a1f2e; color: #d0d8f0; font-size: 13px; min-height: 100vh; }

/* ヘッダー */
.header { background: linear-gradient(135deg,#1e3a6e 0%,#0d2140 100%); padding: 14px 20px; border-bottom: 2px solid #2a4a8a; }
.header h1 { font-size: 18px; color: #7ab3ff; font-weight: bold; }
.header .sub { font-size: 11px; color: #6677aa; margin-top: 3px; }

/* フィルターパネル */
.filter-panel { background: #111827; border-bottom: 1px solid #1e2a40; padding: 12px 20px; display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end; }
.filter-group { display: flex; flex-direction: column; gap: 4px; }
.filter-label { font-size: 11px; color: #6677aa; }
.filter-row { display: flex; align-items: center; gap: 8px; }
.slider-wrap { display: flex; flex-direction: column; gap: 2px; }
.slider-wrap input[type=range] { width: 130px; accent-color: #4488ff; }
.slider-val { font-size: 11px; color: #88aaee; text-align: center; }
select { background: #1e2a40; color: #d0d8f0; border: 1px solid #2a3a5a; border-radius: 4px; padding: 4px 8px; font-size: 12px; }
.checkbox-label { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #aabbee; cursor: pointer; }
.checkbox-label input { accent-color: #4488ff; width: 14px; height: 14px; }
.btn-reset { background: #1e3060; color: #99bbee; border: 1px solid #2a4a8a; border-radius: 4px; padding: 5px 14px; font-size: 12px; cursor: pointer; margin-left: 8px; }
.btn-reset:hover { background: #2a4a8a; }

/* カウント */
.count-bar { padding: 6px 20px; font-size: 11px; color: #6677aa; border-bottom: 1px solid #1e2a40; }
.count-bar span { color: #aabbee; font-weight: bold; }

/* テーブル */
.table-wrap { overflow-x: auto; padding: 12px 20px; }
table { border-collapse: collapse; width: 100%; min-width: 700px; font-size: 12px; }
th, td { border: 1px solid #2a3a5a; padding: 5px 10px; text-align: right; white-space: nowrap; }
th { background: #1e3060; color: #99bbee; font-weight: bold; text-align: center; position: sticky; top: 0; z-index: 2; }
th.left { text-align: left; }
td.date-cell { text-align: left; font-weight: bold; font-family: monospace; color: #aabbee; }
td.flow-cell { color: #aaffcc; }
td.rain-cell { color: #88ddff; }
td.typhoon-cell { text-align: center; color: #ffaa44; }
td.dry-cell { text-align: center; color: #cc99ff; }
tr.has-html:hover { background: #1a2a44; cursor: pointer; }
tr.no-html { opacity: 0.45; }
tr.no-html td { cursor: default; }
tr.hidden { display: none; }

/* リンクボタン群 */
.link-cell { text-align: center; }
.link-cell a { display: inline-block; margin: 0 2px; padding: 2px 7px; border-radius: 3px; font-size: 10px; text-decoration: none; font-weight: bold; }
.link-html { background: #1e4a8a; color: #88ccff; border: 1px solid #2a5aaa; }
.link-html:hover { background: #2a5aaa; }
.link-pdf-op { background: #2a3a1a; color: #aacc77; border: 1px solid #3a5a2a; }
.link-pdf-op:hover { background: #3a5a2a; }
.link-pdf-fl { background: #3a2a1a; color: #ccaa77; border: 1px solid #5a4a2a; }
.link-pdf-fl:hover { background: #5a4a2a; }
.link-na { background: #1e2a3a; color: #445566; border: 1px solid #2a3a4a; pointer-events: none; }

const TOTAL = events.length;

function fmt(v, digits=1) {
  return v == null ? '―' : v.toFixed(digits);
}

function buildRows() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  events.forEach((e, idx) => {
    const hasHtml = AVAILABLE_HTML.has(e.html);
    const tr = document.createElement('tr');
    tr.className = hasHtml ? 'has-html' : 'no-html';
    tr.dataset.idx = idx;

    // リンクセル
    const htmlLink = hasHtml
      ? `<a class="link-html" href="${BASE}${e.html}" target="_blank">水位・流量表</a>`
      : `<a class="link-na link-html">水位・流量表</a>`;
    const opLink = hasHtml
      ? `<a class="link-pdf-op" href="${BASE}${e.op}" target="_blank">操作記録</a>`
      : `<a class="link-na link-pdf-op">操作記録</a>`;
    const flLink = hasHtml
      ? `<a class="link-pdf-fl" href="${BASE}${e.fl}" target="_blank">放流の概要</a>`
      : `<a class="link-na link-pdf-fl">放流の概要</a>`;

    tr.innerHTML = `
      <td class="date-cell">${e.date}</td>
      <td class="flow-cell">${fmt(e.q)}</td>
      <td class="rain-cell">${fmt(e.r6)}</td>
      <td class="rain-cell">${fmt(e.rc)}</td>
      <td class="typhoon-cell">${e.ty ? '🌀' : ''}</td>
      <td class="dry-cell">${e.dry == null ? '―' : e.dry + '日'}</td>
      <td class="link-cell">${htmlLink}${opLink}${flLink}</td>
    `;
    tbody.appendChild(tr);
  });
  updateCount();
}

function applyFilters() {
  const typhoon = document.getElementById('chk-typhoon').checked;
  const qMin = +document.getElementById('sl-qmin').value;
  const qMax = +document.getElementById('sl-qmax').value;
  const r6Min = +document.getElementById('sl-r6min').value;
  const r6Max = +document.getElementById('sl-r6max').value;
  const rcMin = +document.getElementById('sl-rcmin').value;
  const rcMax = +document.getElementById('sl-rcmax').value;
  const dryMin = document.getElementById('sel-dry').value;

  const rows = document.querySelectorAll('#tbody tr');
  rows.forEach(tr => {
    const idx = +tr.dataset.idx;
    const e = events[idx];
    let show = true;
    if (typhoon && !e.ty) show = false;
    if (e.q < qMin || e.q > qMax) show = false;
    if (e.r6 != null && (e.r6 < r6Min || e.r6 > r6Max)) show = false;
    if (e.rc != null && (e.rc < rcMin || e.rc > rcMax)) show = false;
    if (dryMin !== '' && (e.dry == null || e.dry < +dryMin)) show = false;
    tr.classList.toggle('hidden', !show);
  });
  updateCount();
}

function updateCount() {
  const visible = document.querySelectorAll('#tbody tr:not(.hidden)').length;
  document.getElementById('count').textContent = visible;
  document.getElementById('total').textContent = TOTAL;
}

function updateSliderDisplay() {
  document.getElementById('val-qmin').textContent = document.getElementById('sl-qmin').value;
  document.getElementById('val-qmax').textContent = document.getElementById('sl-qmax').value;
  document.getElementById('val-r6min').textContent = document.getElementById('sl-r6min').value;
  document.getElementById('val-r6max').textContent = document.getElementById('sl-r6max').value;
  document.getElementById('val-rcmin').textContent = document.getElementById('sl-rcmin').value;
  document.getElementById('val-rcmax').textContent = document.getElementById('sl-rcmax').value;
}

function resetFilters() {
  document.getElementById('chk-typhoon').checked = false;
  document.getElementById('sl-qmin').value = 0;
  document.getElementById('sl-qmax').value = 6000;
  document.getElementById('sl-r6min').value = 0;
  document.getElementById('sl-r6max').value = 150;
  document.getElementById('sl-rcmin').value = 0;
  document.getElementById('sl-rcmax').value = 500;
  document.getElementById('sel-dry').value = '';
  updateSliderDisplay();
  applyFilters();
}

// イベントバインド
['sl-qmin','sl-qmax','sl-r6min','sl-r6max','sl-rcmin','sl-rcmax'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => { updateSliderDisplay(); applyFilters(); });
});
document.getElementById('chk-typhoon').addEventListener('change', applyFilters);
document.getElementById('sel-dry').addEventListener('change', applyFilters);

// 行クリックでHTML開く
document.getElementById('tbody').addEventListener('click', e => {
  const tr = e.target.closest('tr');
  if (!tr || !tr.classList.contains('has-html')) return;
  // リンクボタンのクリックはそちらに任せる
  if (e.target.tagName === 'A') return;
  const idx = +tr.dataset.idx;
  window.open(BASE + events[idx].html, '_blank');
});

// 初期化
buildRows();
</script>
</body>
</html>
