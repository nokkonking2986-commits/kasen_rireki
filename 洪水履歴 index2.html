<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>洪水履歴 インデックス</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Hiragino Kaku Gothic ProN","Noto Sans CJK JP",sans-serif; background: #1a1f2e; color: #d0d8f0; font-size: 13px; min-height: 100vh; }

/* ヘッダー */
.header { background: linear-gradient(135deg,#1e3a6e 0%,#0d2140 100%); padding: 14px 16px; border-bottom: 2px solid #2a4a8a; }
.header h1 { font-size: 17px; color: #7ab3ff; font-weight: bold; }
.header .sub { font-size: 11px; color: #6677aa; margin-top: 3px; }

/* フィルターパネル */
.filter-panel { background: #111827; border-bottom: 1px solid #1e2a40; padding: 12px 16px; display: flex; flex-direction: column; gap: 12px; }
.filter-group { display: flex; flex-direction: column; gap: 5px; }
.filter-label { font-size: 11px; color: #6677aa; font-weight: bold; }

/* 台風行 */
.checkbox-label { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #aabbee; cursor: pointer; }
.checkbox-label input { accent-color: #4488ff; width: 16px; height: 16px; }

/* +/- ステッパー */
.stepper-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.stepper { display: flex; align-items: center; background: #1e2a40; border: 1px solid #2a3a5a; border-radius: 6px; overflow: hidden; }
.stepper button { background: #243454; color: #88aaee; border: none; width: 30px; height: 30px; font-size: 16px; font-weight: bold; cursor: pointer; user-select: none; touch-action: manipulation; }
.stepper button:active { background: #2f4470; }
.stepper button.minus { border-right: 1px solid #2a3a5a; }
.stepper button.plus { border-left: 1px solid #2a3a5a; }
.stepper input { width: 56px; text-align: center; background: transparent; color: #d0d8f0; border: none; font-size: 13px; height: 30px; }
.stepper input::-webkit-outer-spin-button, .stepper input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.stepper-tilde { color: #445566; font-size: 12px; }
.unit-label { font-size: 11px; color: #6677aa; }

select { background: #1e2a40; color: #d0d8f0; border: 1px solid #2a3a5a; border-radius: 4px; padding: 6px 8px; font-size: 12px; width: 100%; max-width: 200px; }
.btn-reset { background: #1e3060; color: #99bbee; border: 1px solid #2a4a8a; border-radius: 4px; padding: 8px 14px; font-size: 12px; cursor: pointer; align-self: flex-start; touch-action: manipulation; }
.btn-reset:active { background: #2a4a8a; }

/* カウント */
.count-bar { padding: 6px 16px; font-size: 11px; color: #6677aa; border-bottom: 1px solid #1e2a40; }
.count-bar span { color: #aabbee; font-weight: bold; }

/* テーブル */
.table-wrap { overflow-x: auto; padding: 10px 16px; -webkit-overflow-scrolling: touch; }
table { border-collapse: collapse; width: 100%; min-width: 640px; font-size: 12px; }
th, td { border: 1px solid #2a3a5a; padding: 5px 8px; text-align: right; white-space: nowrap; }
th { background: #1e3060; color: #99bbee; font-weight: bold; text-align: center; position: sticky; top: 0; z-index: 2; }
th.left { text-align: left; }
td.date-cell { text-align: left; font-weight: bold; font-family: monospace; color: #aabbee; }
td.rain-cell { color: #88ddff; }
td.typhoon-cell { text-align: center; color: #ffaa44; }
td.dry-cell { text-align: center; color: #cc99ff; }
tr.has-html:hover { background: #1a2a44; cursor: pointer; }
tr.no-html { opacity: 0.45; }
tr.no-html td { cursor: default; }
tr.hidden { display: none; }

/* リンクボタン群 */
.link-cell { text-align: center; }
.link-cell a { display: inline-block; margin: 0 2px; padding: 2px 7px; border-radius: 3px; font-size: 10px; text-decoration: none; font-weight: bold; }
.link-html { background: #1e4a8a; color: #88ccff; border: 1px solid #2a5aaa; }
.link-html:active { background: #2a5aaa; }
.link-pdf-op { background: #2a3a1a; color: #aacc77; border: 1px solid #3a5a2a; }
.link-pdf-op:active { background: #3a5a2a; }
.link-pdf-fl { background: #3a2a1a; color: #ccaa77; border: 1px solid #5a4a2a; }
.link-pdf-fl:active { background: #5a4a2a; }
.link-na { background: #1e2a3a; color: #445566; border: 1px solid #2a3a4a; pointer-events: none; }
</style>
</head>
<body>

<div class="header">
  <h1>📋 洪水履歴 インデックス</h1>
  <div class="sub">フィルター条件はAND絞り込み</div>
</div>

<div class="filter-panel">
  <!-- 台風 -->
  <div class="filter-group">
    <label class="checkbox-label">
      <input type="checkbox" id="chk-typhoon"> 台風のみ表示
    </label>
  </div>

  <!-- 6h雨量MAX -->
  <div class="filter-group">
    <div class="filter-label">6h雨量MAX (mm)</div>
    <div class="stepper-row">
      <div class="stepper">
        <button class="minus" data-target="r6min" data-step="-1">−</button>
        <input type="number" id="val-r6min" value="0">
        <button class="plus" data-target="r6min" data-step="1">＋</button>
      </div>
      <span class="stepper-tilde">〜</span>
      <div class="stepper">
        <button class="minus" data-target="r6max" data-step="-5">−5</button>
        <input type="number" id="val-r6max" value="150">
        <button class="plus" data-target="r6max" data-step="5">＋5</button>
      </div>
    </div>
  </div>

  <!-- 累計雨量MAX -->
  <div class="filter-group">
    <div class="filter-label">累計雨量MAX (mm)</div>
    <div class="stepper-row">
      <div class="stepper">
        <button class="minus" data-target="rcmin" data-step="-1">−</button>
        <input type="number" id="val-rcmin" value="0">
        <button class="plus" data-target="rcmin" data-step="1">＋</button>
      </div>
      <span class="stepper-tilde">〜</span>
      <div class="stepper">
        <button class="minus" data-target="rcmax" data-step="-10">−10</button>
        <input type="number" id="val-rcmax" value="500">
        <button class="plus" data-target="rcmax" data-step="10">＋10</button>
      </div>
    </div>
  </div>

  <!-- 降雨開始時の流入量 -->
  <div class="filter-group">
    <div class="filter-label">降雨開始時の流入量 (m³/s)</div>
    <div class="stepper-row">
      <div class="stepper">
        <button class="minus" data-target="q0min" data-step="-1">−</button>
        <input type="number" id="val-q0min" value="0">
        <button class="plus" data-target="q0min" data-step="1">＋</button>
      </div>
      <span class="stepper-tilde">〜</span>
      <div class="stepper">
        <button class="minus" data-target="q0max" data-step="-5">−5</button>
        <input type="number" id="val-q0max" value="2000">
        <button class="plus" data-target="q0max" data-step="5">＋5</button>
      </div>
    </div>
    <div class="unit-label">※データ追加予定</div>
  </div>

  <!-- 無降雨日数 -->
  <div class="filter-group">
    <div class="filter-label">洪水前 無降雨日数</div>
    <select id="sel-dry">
      <option value="">すべて</option>
      <option value="0">0日以下</option>
      <option value="1">1日以下</option>
      <option value="2">2日以下</option>
      <option value="3">3日以下</option>
      <option value="5">5日以下</option>
      <option value="10">10日以下</option>
      <option value="20">20日以下</option>
    </select>
  </div>

  <button class="btn-reset" onclick="resetFilters()">フィルターをリセット</button>
</div>

<div class="count-bar">表示中: <span id="count">―</span> 件 / 全 <span id="total">―</span> 件</div>

<div class="table-wrap">
<table id="main-table">
  <thead>
    <tr>
      <th class="left">日付</th>
      <th>6h雨量MAX<br>mm</th>
      <th>累計雨量<br>mm</th>
      <th>台風</th>
      <th>無降雨<br>日数</th>
      <th>リンク</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>
</div>

const TOTAL = events.length;

function fmt(v, digits=1) {
  return v == null ? '―' : v.toFixed(digits);
}

function buildRows() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  events.forEach((e, idx) => {
    const hasHtml = AVAILABLE_HTML.has(e.html);
    const tr = document.createElement('tr');
    tr.className = hasHtml ? 'has-html' : 'no-html';
    tr.dataset.idx = idx;

    const htmlLink = hasHtml
      ? `<a class="link-html" href="${BASE}${e.html}" target="_blank">水位・流量表</a>`
      : `<a class="link-na link-html">水位・流量表</a>`;
    const opLink = hasHtml
      ? `<a class="link-pdf-op" href="${BASE}${e.op}" target="_blank">操作記録</a>`
      : `<a class="link-na link-pdf-op">操作記録</a>`;
    const flLink = hasHtml
      ? `<a class="link-pdf-fl" href="${BASE}${e.fl}" target="_blank">放流の概要</a>`
      : `<a class="link-na link-pdf-fl">放流の概要</a>`;

    tr.innerHTML = `
      <td class="date-cell">${e.date}</td>
      <td class="rain-cell">${fmt(e.r6)}</td>
      <td class="rain-cell">${fmt(e.rc)}</td>
      <td class="typhoon-cell">${e.ty ? '🌀' : ''}</td>
      <td class="dry-cell">${e.dry == null ? '―' : e.dry + '日'}</td>
      <td class="link-cell">${htmlLink}${opLink}${flLink}</td>
    `;
    tbody.appendChild(tr);
  });
  updateCount();
}

function applyFilters() {
  const typhoon = document.getElementById('chk-typhoon').checked;
  const r6Min = +document.getElementById('val-r6min').value;
  const r6Max = +document.getElementById('val-r6max').value;
  const rcMin = +document.getElementById('val-rcmin').value;
  const rcMax = +document.getElementById('val-rcmax').value;
  const q0Min = +document.getElementById('val-q0min').value;
  const q0Max = +document.getElementById('val-q0max').value;
  const dryMax = document.getElementById('sel-dry').value;

  const rows = document.querySelectorAll('#tbody tr');
  rows.forEach(tr => {
    const idx = +tr.dataset.idx;
    const e = events[idx];
    let show = true;
    if (typhoon && !e.ty) show = false;
    if (e.r6 != null && (e.r6 < r6Min || e.r6 > r6Max)) show = false;
    if (e.rc != null && (e.rc < rcMin || e.rc > rcMax)) show = false;
    if (e.q0 != null && (e.q0 < q0Min || e.q0 > q0Max)) show = false;
    if (dryMax !== '' && (e.dry == null || e.dry > +dryMax)) show = false;
    tr.classList.toggle('hidden', !show);
  });
  updateCount();
}

function updateCount() {
  const visible = document.querySelectorAll('#tbody tr:not(.hidden)').length;
  document.getElementById('count').textContent = visible;
  document.getElementById('total').textContent = TOTAL;
}

function resetFilters() {
  document.getElementById('chk-typhoon').checked = false;
  Object.keys(DEFAULTS).forEach(k => {
    document.getElementById('val-' + k).value = DEFAULTS[k];
  });
  document.getElementById('sel-dry').value = '';
  applyFilters();
}

// ステッパーボタン
document.querySelectorAll('.stepper button').forEach(btn => {
  btn.addEventListener('click', () => {
    const target = btn.dataset.target;
    const step = +btn.dataset.step;
    const input = document.getElementById('val-' + target);
    let v = (+input.value) + step;
    if (v < 0) v = 0;
    input.value = v;
    applyFilters();
  });
});

// 数値直接入力
document.querySelectorAll('.stepper input').forEach(input => {
  input.addEventListener('input', applyFilters);
});

document.getElementById('chk-typhoon').addEventListener('change', applyFilters);
document.getElementById('sel-dry').addEventListener('change', applyFilters);

// 行クリックでHTML開く
document.getElementById('tbody').addEventListener('click', e => {
  const tr = e.target.closest('tr');
  if (!tr || !tr.classList.contains('has-html')) return;
  if (e.target.tagName === 'A') return;
  const idx = +tr.dataset.idx;
  window.open(BASE + events[idx].html, '_blank');
});

buildRows();
</script>
</body>
</html>
