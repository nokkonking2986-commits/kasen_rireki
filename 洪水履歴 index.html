<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>洪水履歴 インデックス</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Hiragino Kaku Gothic ProN","Noto Sans CJK JP",sans-serif; background: #1a1f2e; color: #d0d8f0; font-size: 13px; }

.header { background: linear-gradient(135deg,#1e3a6e 0%,#0d2140 100%); padding: 12px 14px; border-bottom: 2px solid #2a4a8a; }
.header h1 { font-size: 16px; color: #7ab3ff; font-weight: bold; }
.header .sub { font-size: 11px; color: #6677aa; margin-top: 2px; }

/* フィルターパネル */
.filter-panel { background: #111827; border-bottom: 1px solid #1e2a40; padding: 12px 14px; display: flex; flex-direction: column; gap: 14px; }
.filter-group { display: flex; flex-direction: column; gap: 6px; }
.filter-label { font-size: 12px; color: #aabbdd; font-weight: bold; }
.filter-note { font-size: 10px; color: #556688; line-height: 1.4; }

/* 台風チェック */
.checkbox-label { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #aabbee; cursor: pointer; padding: 6px 0; }
.checkbox-label input { accent-color: #4488ff; width: 22px; height: 22px; }

/* セレクト2個横並び */
.select-row { display: flex; align-items: center; gap: 10px; }
.tilde { color: #88aacc; font-size: 16px; font-weight: bold; }
select.range-sel {
  background: #1a2a40;
  color: #e0eaff;
  border: 1px solid #2a4a8a;
  border-radius: 8px;
  padding: 0 8px;
  font-size: 15px;
  font-weight: bold;
  height: 48px;
  flex: 1;
  max-width: 140px;
  -webkit-appearance: none;
  appearance: none;
  text-align: center;
}

/* 無降雨日数ドロップダウン */
select.dry-sel {
  background: #1a2a40;
  color: #d0d8f0;
  border: 1px solid #2a4a8a;
  border-radius: 8px;
  padding: 0 10px;
  font-size: 14px;
  height: 48px;
  width: 100%;
  max-width: 220px;
}

.btn-reset { background: #1e3060; color: #88aaee; border: 1px solid #2a4a8a; border-radius: 8px; padding: 12px 24px; font-size: 13px; cursor: pointer; touch-action: manipulation; align-self: flex-start; }
.btn-reset:active { background: #2a4a8a; }

/* カウント */
.count-bar { padding: 5px 14px; font-size: 11px; color: #6677aa; border-bottom: 1px solid #1e2a40; }
.count-bar span { color: #aabbee; font-weight: bold; }

/* テーブル */
.table-wrap { overflow-x: auto; padding: 8px 4px; -webkit-overflow-scrolling: touch; }
table { border-collapse: collapse; width: 100%; font-size: 11px; }
th, td { border: 1px solid #2a3a5a; padding: 4px 5px; text-align: right; white-space: nowrap; }
th { background: #1e3060; color: #99bbee; font-weight: bold; text-align: center; position: sticky; top: 0; z-index: 2; font-size: 10px; line-height: 1.3; }
td.date-cell { text-align: left; font-weight: bold; font-family: monospace; color: #aabbee; font-size: 11px; }
td.q-cell { color: #aaffcc; }
td.rain-cell { color: #88ddff; }
td.typhoon-cell { text-align: center; color: #ffaa44; }
td.dry-cell { text-align: center; color: #cc99ff; }
tr.has-html:hover { background: #1a2a44; cursor: pointer; }
tr.no-html { opacity: 0.4; }
tr.hidden { display: none; }

.link-cell { text-align: center; padding: 3px 2px; }
.link-cell a { display: inline-block; margin: 1px; padding: 3px 5px; border-radius: 3px; font-size: 9px; text-decoration: none; font-weight: bold; }
.link-html   { background: #1e4a8a; color: #88ccff; border: 1px solid #2a5aaa; }
.link-pdf-op { background: #2a3a1a; color: #aacc77; border: 1px solid #3a5a2a; }
.link-pdf-fl { background: #3a2a1a; color: #ccaa77; border: 1px solid #5a4a2a; }
.link-na { background: #1e2a3a; color: #445566; border: 1px solid #2a3a4a; pointer-events: none; }
</style>
</head>

<div class="header">
  <h1>📋 洪水履歴 インデックス</h1>
  <div class="sub">条件はAND絞り込み</div>
</div>

<div class="filter-panel">

  <!-- 台風 -->
  <div class="filter-group">
    <label class="checkbox-label">
      <input type="checkbox" id="chk-typhoon"> 台風のみ表示
    </label>
  </div>

  <div class="filter-group">
    <div class="filter-label">6h雨量MAX (mm)</div>
    <div class="select-row">
      <select class="range-sel" id="sel-r6min"></select>
      <span class="tilde">〜</span>
      <select class="range-sel" id="sel-r6max"></select>
    </div>
  </div>

    </div>

    </div>

  </div>

    <div class="filter-note">降雨が観測されるまで雨が降っていなかった日数</div>
    <select class="dry-sel" id="sel-dry">

      <option value="0">0日以下</option>
      <option value="1">1日以下</option>
      <option value="2">2日以下</option>
      <option value="3">3日以下</option>
      <option value="5">5日以下</option>
      <option value="10">10日以下</option>
      <option value="20">20日以下</option>
    </select>
  </div>

  <button class="btn-reset" onclick="resetFilters()">リセット</button>
</div>

<div class="count-bar">表示: <span id="count">―</span> / <span id="total">―</span> 件</div>

<div class="table-wrap">
<table>

    <tr>

      <th>無降雨<br>日</th>
      <th>リンク</th>
    </tr>

  <tbody id="tbody"></tbody>
</table>

// 選択肢生成（0から指定maxまで5刻み）
function makeOptions(selId, max, defaultVal) {
  const sel = document.getElementById(selId);
  for (let v = 0; v <= max; v += 5) {
    const opt = document.createElement('option');
    opt.value = v;
    opt.textContent = v;
    if (v === defaultVal) opt.selected = true;
    sel.appendChild(opt);
  }
}

    tr.dataset.idx = idx;
    const hL = has ? `<a class="link-html" href="${BASE}${e.html}" target="_blank">流量表</a>` : `<a class="link-na">流量表</a>`;
    const oL = has ? `<a class="link-pdf-op" href="${BASE}${e.op}" target="_blank">操作記録</a>` : `<a class="link-na">操作記録</a>`;
    const fL = has ? `<a class="link-pdf-fl" href="${BASE}${e.fl}" target="_blank">放流概要</a>` : `<a class="link-na">放流概要</a>`;
    tr.innerHTML = `
      <td class="date-cell">${e.date}</td>
      <td class="q-cell">${fmt(e.q)}</td>
      <td class="rain-cell">${fmt(e.r6)}</td>
      <td class="rain-cell">${fmt(e.rc)}</td>
      <td class="typhoon-cell">${e.ty ? '🌀' : ''}</td>
      <td class="dry-cell">${e.dry==null ? '―' : e.dry}</td>
      <td class="link-cell">${hL}${oL}${fL}</td>`;
    tbody.appendChild(tr);
  });
  updateCount();
}

function applyFilters(){
  const ty   = document.getElementById('chk-typhoon').checked;
  const r6n  = +document.getElementById('sel-r6min').value;
  const r6x  = +document.getElementById('sel-r6max').value;
  const rcn  = +document.getElementById('sel-rcmin').value;
  const rcx  = +document.getElementById('sel-rcmax').value;
  const q0n  = +document.getElementById('sel-q0min').value;
  const q0x  = +document.getElementById('sel-q0max').value;
  const dry  = document.getElementById('sel-dry').value;

  document.querySelectorAll('#tbody tr').forEach(tr => {
    const e = events[+tr.dataset.idx];
    let show = true;
    if(ty && !e.ty) show = false;
    if(e.r6!=null && (e.r6 < r6n || e.r6 > r6x)) show = false;
    if(e.rc!=null && (e.rc < rcn || e.rc > rcx)) show = false;
    if(e.q0!=null && (e.q0 < q0n || e.q0 > q0x)) show = false;
    if(dry !== '' && (e.dry==null || e.dry > +dry)) show = false;
    tr.classList.toggle('hidden', !show);
  });
  updateCount();
}

function updateCount(){
  document.getElementById('count').textContent = document.querySelectorAll('#tbody tr:not(.hidden)').length;
  document.getElementById('total').textContent = TOTAL;
}

function resetFilters(){
  document.getElementById('chk-typhoon').checked = false;
  document.getElementById('sel-r6min').value  = 0;
  document.getElementById('sel-r6max').value  = 60;
  document.getElementById('sel-rcmin').value  = 0;
  document.getElementById('sel-rcmax').value  = 100;
  document.getElementById('sel-q0min').value  = 0;
  document.getElementById('sel-q0max').value  = 50;
  document.getElementById('sel-dry').value    = '';
  applyFilters();
}

['sel-r6min','sel-r6max','sel-rcmin','sel-rcmax','sel-q0min','sel-q0max','sel-dry'].forEach(id => {
  document.getElementById(id).addEventListener('change', applyFilters);
});
document.getElementById('chk-typhoon').addEventListener('change', applyFilters);
document.getElementById('tbody').addEventListener('click', e => {
  const tr = e.target.closest('tr');
  if(!tr || !tr.classList.contains('has-html') || e.target.tagName==='A') return;
  window.open(BASE + events[+tr.dataset.idx].html, '_blank');
});

buildRows();
</script>
</body>
</html>
